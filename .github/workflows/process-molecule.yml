name: Process Molecule

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Extract SMILES
        id: extract
        run: |
          set -e
          BODY="${{ github.event.issue.body }}"
          SMILES=$(echo "$BODY" | awk '/SMILES/{flag=NR+2} NR==flag{print; exit}' | xargs)
          
          if [ -z "$SMILES" ]; then
            echo "No SMILES found in the issue body."
            exit 1
          fi

          echo "smiles=$SMILES" >> $GITHUB_OUTPUT

      - name: Call API
        id: api
        run: |
          set -e
          SMILES="${{ steps.extract.outputs.smiles }}"
          PAYLOAD=$(jq -n --arg s "$SMILES" \
            '{
              "smiles": [$s],
              "selectedModels": {
                "ELECTRA (ChEBI50-3STAR)": true,
                "ResGated (ChEBI100-3STAR)": true,
                "GAT (ChEBI100-3STAR)": true,
                "GAT-aug (ChEBI100)": true,
                "GAT-aug (ChEBI50-3STAR)": true,
                "ResGated-aug (ChEBI50)": true,
                "C3P": true,
                "ChemLog": true,
                "ChEBI Lookup": true,
                "Lopster": true
              }
            }')

          RESPONSE=$(curl -s -X POST https://chebifier.hastingslab.org/api/classify \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "$RESPONSE" | jq -c . > result.json


      - name: Format Result  
        id: format
        run: |
          TABLE=$(jq -r '
            .direct_parents[0] |
            ["ChEBI ID | Class | Score | Models Predicting",
             "--- | --- | --- | ---"] +
            (map(
              . as $row |
              ($row[2] | to_entries |
               map(select(.value.prediction == true) | .key) |
               join(", ")) as $models |
              "\($row[0]) | \($row[1]) | \($row[3]) | \($models)"
            ))
            | join("\n")
          ' result.json)

          
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "$TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment Result on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.format.outputs.table }}`;
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `**Prediction Result**\n\n${result}`
            })

